<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Ethereum TestRPC</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <script src='main.js'></script>
</head>

<body>
    <h1 id="response">404</h1>
    <button onclick="pingServer()">ping server</button>

    <script>
        // request data from a web server and display it
        function pingServer() {
            var xhttp = new XMLHttpRequest();
            xhttp.onreadystatechange = function () {
                if (this.readyState == 4 && this.status == 200) {
                    //parse the response object that was sent
                    var responseObj = JSON.parse(this.responseText);

                    document.getElementById("response").innerHTML = responseObj.key;
                }
            };
            xhttp.open("GET", "ping", true);
            xhttp.send();
        }
    </script>
</body>

</html>
